<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 🐱</title>

<style>
body{
  text-align:center;
  font-family: Arial, sans-serif;
  background:#fff0f5;
  padding:30px 15px;
}

h1{
  font-size:24px;
}

p{
  font-size:18px;
}

img{
  width:70%;
  max-width:250px;
  border-radius:10px;
}

button{
  padding:15px 20px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#ff7aa2;
  color:white;
}

#noBtn{
  position:relative;
}


</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
<h1>I think I was rude... I'm really sorry 🐱</h1>

<img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExcmRpOGlscDF1dnNhbzdpbDk1cGhkd3dzZDJpZzVmMjAycGxvc3ptMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/sLkIthus9lEwoe7PRx/giphy.gif">

<p>
You didn’t deserve that.  
I really value our friendship and I feel bad about how I acted.
</p>

<button onclick="forgive()">Forgive me 🐾</button>
<button id="noBtn" onclick="moveButton()">Still mad 😾</button>
</div>

<!-- PAGE 2 -->
<div id="page2" style="display: none;">
<h1>Thank you 🐱</h1>

<p>
You just made my day better.  
I promise to be kinder next time.
</p>

<button onclick="goBack()">Back</button>
</div>

<script>

function forgive(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";
}

function goBack(){
document.getElementById("page2").style.display="none";
document.getElementById("page1").style.display="block";
}

function moveButton(){
let btn = document.getElementById("noBtn");

let x = Math.random()*200 - 100;
let y = Math.random()*200 - 100;

btn.style.transform = `translate(${x}px, ${y}px)`;
}

</script>

</body>
</html>
